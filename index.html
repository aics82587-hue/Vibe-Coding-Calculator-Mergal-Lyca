<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional General Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="calculator-container">
        <div class="calculator">
            <header class="calculator-display">
                <!-- Clean, semantic read-only display container -->
                <div id="display" class="display">0</div>
            </header>

            <section class="calculator-keys" id="keypad">
                <!-- 4 columns grid system for layout speed and stability -->
                <!-- No inline 'onclick' JS present anywhere. Handled via Event Delegation -->
                <button type="button" class="key action" data-action="clear">AC</button>
                <button type="button" class="key action" data-action="delete">DEL</button>
                <button type="button" class="key action" data-action="percentage">%</button>
                <button type="button" class="key operator" data-action="divide">÷</button>

                <button type="button" class="key number" data-value="7">7</button>
                <button type="button" class="key number" data-value="8">8</button>
                <button type="button" class="key number" data-value="9">9</button>
                <button type="button" class="key operator" data-action="multiply">×</button>

                <button type="button" class="key number" data-value="4">4</button>
                <button type="button" class="key number" data-value="5">5</button>
                <button type="button" class="key number" data-value="6">6</button>
                <button type="button" class="key operator" data-action="subtract">-</button>

                <button type="button" class="key number" data-value="1">1</button>
                <button type="button" class="key number" data-value="2">2</button>
                <button type="button" class="key number" data-value="3">3</button>
                <button type="button" class="key operator" data-action="add">+</button>

                <!-- Zero spans two columns for quick access (procurement standard) -->
                <button type="button" class="key number zero" data-value="0">0</button>
                <button type="button" class="key number" data-value=".">.</button>
                <button type="button" class="key calculate" data-action="calculate">=</button>
            </section>
        </div>
    </main>

    <!-- Script referenced at end of body for optimal load time -->
    <script src="script.js"></script>
</body>

</html>
